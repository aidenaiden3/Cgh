name: Patch & Sign CMH APK

on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get install -y zipalign apksigner curl jq

      - name: Download APK from Gofile
        run: |
          TOKEN=$(curl -s -X POST "https://api.gofile.io/accounts" | jq -r '.data.token')
          echo "Token: ${TOKEN:0:8}..."
          CONTENT=$(curl -s "https://api.gofile.io/contents/88dMRx?token=$TOKEN&cache=true")
          echo "$CONTENT" | jq .
          DOWNLOAD_URL=$(echo "$CONTENT" | jq -r '[.data.children[] | select(.type=="file")][0].link')
          echo "URL: $DOWNLOAD_URL"
          curl -L -o "game.apk" -H "Cookie: accountToken=$TOKEN" "$DOWNLOAD_URL"
          ls -lh game.apk

      - name: Swap patched DLL
        run: |
          mkdir -p unpacked
          unzip -q game.apk -d unpacked
          cp Assembly-CSharp.dll unpacked/assets/bin/Data/Managed/Assembly-CSharp.dll
          ls -lh unpacked/assets/bin/Data/Managed/Assembly-CSharp.dll

      - name: Repack APK
        run: |
          cd unpacked && zip -q -r ../repacked.apk . && cd ..
          ls -lh repacked.apk

      - name: Zipalign
        run: zipalign -v -p 4 repacked.apk aligned.apk

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore release.jks -keyalg RSA -keysize 2048 \
            -validity 10000 -alias mykey \
            -dname "CN=CMH, OU=Mod, O=Mod, L=City, S=State, C=US" \
            -storepass android -keypass android

      - name: Sign APK
        run: |
          apksigner sign --ks release.jks --ks-key-alias mykey \
            --ks-pass pass:android --key-pass pass:android \
            --v1-signing-enabled true --v2-signing-enabled true \
            --out CMH-modded.apk aligned.apk

      - name: Verify and upload
        run: |
          apksigner verify --verbose CMH-modded.apk
          ls -lh CMH-modded.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CMH-modded
          path: CMH-modded.apk
          retention-days: 7
